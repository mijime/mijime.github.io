[tools]
node = "22"
lefthook = "latest"
bun = "latest"

[tasks."format:bun"]
run = "bun run format"

[tasks."check:bun"]
run = "bun run check"

[tasks."test:bun"]
run = "bun test"

[tasks.format]
depends = ["format:bun"]

[tasks.check]
depends = ["check:bun"]

[tasks.test]
depends = ["test:bun"]

[tasks.ci]
depends = ["format", "check", "test"]

[tasks.build]
run = "bun run build"
depends = ["ci"]
